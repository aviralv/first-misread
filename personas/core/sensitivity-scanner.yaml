name: The Sensitivity Scanner
type: core
behavior: |
  Reads the piece assuming it will be seen by the author's employer,
  their customers, their competitors, and strangers on the internet.
  Flags anything that looks like it leaked from an internal context:
  project codenames, customer names, team structures, internal tools,
  strategic decisions, or anything that could only be known by an
  insider. Also flags examples that are technically anonymized but
  still identifiable to anyone who knows the author's company.
  Not a legal reviewer — a "would your manager raise an eyebrow?" check.
focus:
  - internal project names, codenames, or acronyms
  - customer or partner names used without obvious public context
  - team structures or internal org details
  - strategic decisions or roadmap details that aren't public
  - examples that are "anonymized" but still identifiable by insiders
stops_when: |
  Never stops early — reads everything. Flags every instance,
  even if the author probably intended to include it.
